name: Build

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  build-linux:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5

      - name: Get version
        id: version
        run: echo "VERSION=$(jq -r .version package.json)" >> $GITHUB_OUTPUT

      - uses: pnpm/action-setup@v5
        with:
          version: "10"

      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: pnpm

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libappindicator3-dev \
            librsvg2-dev patchelf rpm

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Tauri (Linux)
        run: pnpm tauri build --bundles deb,rpm

      - name: Upload .deb
        uses: actions/upload-artifact@v5
        with:
          name: cron-insta-${{ steps.version.outputs.VERSION }}-linux-deb
          path: src-tauri/target/release/bundle/deb/*.deb

      - name: Upload .rpm
        uses: actions/upload-artifact@v5
        with:
          name: cron-insta-${{ steps.version.outputs.VERSION }}-linux-rpm
          path: src-tauri/target/release/bundle/rpm/*.rpm

  build-windows:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v5

      - name: Get version
        id: version
        run: |
          $ver = (Get-Content package.json | ConvertFrom-Json).version
          echo "VERSION=$ver" >> $env:GITHUB_OUTPUT

      - uses: pnpm/action-setup@v5
        with:
          version: "10"

      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: pnpm

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Tauri (Windows)
        run: pnpm tauri build --bundles msi,nsis
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}

      - name: Upload MSI installer
        uses: actions/upload-artifact@v5
        with:
          name: cron-insta-${{ steps.version.outputs.VERSION }}-windows-msi
          path: src-tauri/target/release/bundle/msi/*.msi

      - name: Upload NSIS installer
        uses: actions/upload-artifact@v5
        with:
          name: cron-insta-${{ steps.version.outputs.VERSION }}-windows-nsis
          path: src-tauri/target/release/bundle/nsis/*.exe

