schema: spec-driven

context: |
  Tech: Tauri v2 (Rust) + SvelteKit/Svelte 5 + TypeScript + TipTap v3 editor
  Arch: Local-First desktop app, IPC via Tauri commands, embedded Git for versioning
  Pkg: pnpm 10
  Testing: Rust — 84 #[cfg(test)] unit tests in lib.rs. Frontend — NO test runner (vitest/jest not installed).
  Quality: TypeScript strict mode, svelte-check type checking. No linter/formatter configured.
  Style: Minimalist UI, 60/40 layout (editor/sidebar), bubble menu, drag-and-drop, SPA mode with adapter-static.

rules:
  proposal:
    - Include rollback plan for risky changes
  specs:
    - Use Given/When/Then for scenarios
    - Use RFC 2119 keywords (MUST, SHALL, SHOULD, MAY)
  design:
    - Include sequence diagrams for complex flows
    - Document architecture decisions with rationale
  tasks:
    - Group by phase, use hierarchical numbering
    - Keep tasks completable in one session
  apply:
    tdd: false
    test_command: "cargo test --manifest-path src-tauri/Cargo.toml"
  verify:
    test_command: "cargo test --manifest-path src-tauri/Cargo.toml"
    build_command: "pnpm tauri build"
    coverage_threshold: 0
  archive:
    - Warn before merging destructive deltas
