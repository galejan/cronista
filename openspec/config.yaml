schema: spec-driven

context: |
  Tech: Tauri (Rust) + Svelte 5/TypeScript + Tailwind CSS + TipTap editor
  Arch: Local-First desktop app, IPC via Tauri commands, embedded Git for versioning
  Pkg: pnpm
  Testing: Planned — Rust #[cfg(test)] + Vitest/Svelte Testing Library (not yet scaffolded)
  Style: Minimalist UI, 60/40 layout (editor/sidebar), bubble menu, drag-and-drop

rules:
  proposal:
    - Include rollback plan for risky changes
  specs:
    - Use Given/When/Then for scenarios
    - Use RFC 2119 keywords (MUST, SHALL, SHOULD, MAY)
  design:
    - Include sequence diagrams for complex flows
    - Document architecture decisions with rationale
  tasks:
    - Group by phase, use hierarchical numbering
    - Keep tasks completable in one session
  apply:
    - Follow existing code patterns
    tdd: false
    test_command: ""
  verify:
    test_command: ""
    build_command: ""
    coverage_threshold: 0
  archive:
    - Warn before merging destructive deltas
